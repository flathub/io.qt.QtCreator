app-id: io.qt.QtCreator
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.openjdk
add-extensions:
  org.freedesktop.Sdk.Extension.llvm22:
    version: '25.08'
    directory: lib/sdk/llvm22
    add-ld-path: lib
    autodelete: false
    no-autodownload: false
command: qtcreator
rename-desktop-file: org.qt-project.qtcreator.desktop
rename-appdata-file: org.qt-project.qtcreator.appdata.xml
rename-icon: QtProject-qtcreator
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=x11
  - --socket=ssh-auth
  - --filesystem=host
  - --filesystem=/sys
  - --device=dri
  - --allow=devel
  - --env=VCPKG_ROOT=$HOME/.local/share/vcpkg
  - --env=LLVM_INSTALL_DIR=/app/lib/sdk/llvm22
  - --env=PATH=/app/bin:/app/libexec/qtcreator/clang/bin:/app/lib/sdk/llvm22/bin:/usr/bin:/usr/lib/sdk/node22/bin
build-options:
  arch:
    aarch64:
      prepend-pkg-config-path: /app/lib/aarch64-linux-gnu/pkgconfig
    x86_64:
      prepend-pkg-config-path: /app/lib/x86_64-linux-gnu/pkgconfig
modules:
  - krb5.yaml
  - name: qt-creator
    buildsystem: simple
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://download.qt.io/official_releases/qtcreator/20.0/20.0.0/installer_source/linux_x64/qtcreator.7z
        sha256: c47a0033e081df821b259ead2678b70d48a16fa21ec9fa904c1ea1e71622386d
        strip-components: 0
        x-checker-data:
          type: anitya
          project-id: 4136
          url-template: https://download.qt.io/official_releases/qtcreator/$major.$minor/$version/installer_source/linux_x64/qtcreator.7z
          stable-only: true
      - type: archive
        only-arches:
          - aarch64
        url: https://download.qt.io/official_releases/qtcreator/20.0/20.0.0/installer_source/linux_arm64/qtcreator.7z
        sha256: 64027f037642abe58ae65a5c393b2987a83fcf841cb20e7424b768a494b458c9
        strip-components: 0
        x-checker-data:
          type: anitya
          project-id: 4136
          url-template: https://download.qt.io/official_releases/qtcreator/$major.$minor/$version/installer_source/linux_arm64/qtcreator.7z
          stable-only: true
    build-commands:
      - cp -a bin lib libexec share "$FLATPAK_DEST/"
      - install -d "$FLATPAK_DEST/lib/sdk/llvm22"
      - install -d "$FLATPAK_DEST/extensions"
  - mold.yaml
  - python3-conan.yaml
  - python3-gcovr.yaml
  - vcpkg-tool.yaml
  - fontconfig.yaml
