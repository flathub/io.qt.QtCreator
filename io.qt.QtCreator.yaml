app-id: io.qt.QtCreator
runtime: org.freedesktop.Sdk
runtime-version: '21.08'
sdk: org.freedesktop.Sdk//21.08
sdk-extensions:
  - org.freedesktop.Sdk.Extension.qt6
command: qtcreator
rename-desktop-file: org.qt-project.qtcreator.desktop
rename-appdata-file: org.qt-project.qtcreator.appdata.xml
rename-icon: QtProject-qtcreator
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=host
  - --device=dri
  - --env=PATH=/app/bin:/usr/lib/sdk/qt6/bin
  - --allow=devel
add-extensions:
  io.qt.QtCreator.Extension:
    directory: extensions
    subdirectories: true
    autodelete: true
modules:
  - name: clang
    buildsystem: cmake-ninja
    build-options:
      cflags: -g1
      cxxflags: -g1
    subdir: llvm
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=MinSizeRel
      - -DLLVM_ENABLE_RTTI=ON
      - -DLLVM_ENABLE_PROJECTS=clang;clang-tools-extra
      - -DLLVM_INCLUDE_DOCS=OFF
      - -DLLVM_INCLUDE_TESTS=OFF
      - -DLLVM_INCLUDE_EXAMPLES=OFF
      - -DLLVM_INCLUDE_BENCHMARKS=OFF
      - -DLLVM_ENABLE_BINDINGS=OFF
      - -DLLVM_INSTALL_UTILS=OFF
      - -DLLVM_ENABLE_UNWIND_TABLES=OFF
      - -DLLVM_TARGETS_TO_BUILD=host
      - -DLLVM_PARALLEL_LINK_JOBS=1
      - -Wno-dev
    sources:
      - type: git
        url: https://code.qt.io/clang/llvm-project.git
        branch: release_110-based
  - name: clazy
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DLINK_CLAZY_TO_LLVM=OFF
      - -DCLAZY_MAN_PAGE=OFF
    sources:
      - type: git
        url: https://invent.kde.org/sdk/clazy.git
        tag: v1.11
        x-checker-data:
          type: anitya
          project-id: 14862
          tag-template: v$version
          stable-only: true
        commit: 821296032a16932cabe012649b4ce898de6e34eb
    cleanup:
      - /share/doc/clazy/
      - /bin/clazy
  - name: qt-creator
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_PREFIX_PATH=/usr/lib/sdk/qt6
      - -DCMAKE_BUILD_TYPE=Release
      - -DSHOW_BUILD_DATE=ON
      - -Wno-dev
    sources:
      - type: git
        url: https://code.qt.io/qt-creator/qt-creator.git
        tag: v7.0.0
        x-checker-data:
          type: anitya
          project-id: 4136
          tag-template: v$version
          stable-only: true
        commit: 638b93591be0b1ddad4b342c85071d8ac7a8f1fb
  - name: create-extension-directory
    buildsystem: simple
    build-commands:
      - install -d /app/extensions
cleanup:
  - /include/llvm
  - /include/clang
  - /include/llvm-c
  - /share/clang
  - /lib/clang
  - /lib/cmake/llvm
  - /lib/libclang*.a
  - /lib/libLLVM*.a
  - /bin/diagtool
  - /bin/llvm*
  - /bin/git-clang-format
  - /bin/c-index-test
  - /bin/scan-build
  - /libexec/ccc-analyzer
  - /libexec/c++-analyzer
  - /share/man
  - /share/scan-build
  - /bin/scan-view
  - /share/scan-view
  - /bin/modularize
  - /include/clang-tidy
  - /lib/libfindAllSymbols.a
  - /bin/find-all-symbols
  - /bin/pp-trace
  - /include/clang-c
  - /bin/hmaptool
  - /bin/bugpoint
  - /bin/dsymutil
  - /bin/llc
  - /bin/lli
  - /bin/obj2yaml
  - /bin/opt
  - /share/opt-viewer
  - /bin/sancov
  - /bin/sanstats
  - /bin/verify-uselistorder
  - /bin/yaml2obj
  - /lib/cmake/clang
  - /bin/clang
  - /bin/clang++
  - /bin/clang-11
  - /bin/clang-apply-replacements
  - /bin/clang-change-namespace
  - /bin/clang-check
  - /bin/clang-cl
  - /bin/clang-cpp
  - /bin/clangd
  - /bin/clang-doc
  - /bin/clang-extdef-mapping
  - /bin/clang-format
  - /bin/clang-include-fixer
  - /bin/clang-move
  - /bin/clang-offload-bundler
  - /bin/clang-offload-wrapper
  - /bin/clang-query
  - /bin/clang-refactor
  - /bin/clang-rename
  - /bin/clang-reorder-fields
  - /bin/clang-scan-deps
cleanup-commands:
  - /app/libexec/qtcreator/sdktool addQt --id qt6 --name Qt6 --qmake /usr/lib/sdk/qt6/bin/qmake
    --type Qt4ProjectManager.QtVersion.Desktop
  - /app/libexec/qtcreator/sdktool addKit --id qt6 --name Qt6 --devicetype Desktop
    --device "Desktop Device" --qt qt6
