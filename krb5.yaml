name: krb5
buildsystem: autotools
subdir: src
config-opts:
  - --disable-static
  - --disable-rpath
  - --without-libedit
  - --without-readline
  - --without-system-verto
cleanup:
  - /bin
  - /sbin
  - /share/doc
  - /share/examples
  - /share/man
  - /include
  - /lib/pkgconfig
sources:
  - type: archive
    url: https://kerberos.org/dist/krb5/1.22/krb5-1.22.2.tar.gz
    sha256: 3243ffbc8ea4d4ac22ddc7dd2a1dc54c57874c40648b60ff97009763554eaf13
    x-checker-data:
      type: anitya
      project-id: 3909
      url-template: https://kerberos.org/dist/krb5/$version_major.$version_minor/krb5-$version.tar.gz
      stable-only: true
